<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Watch on MLB</title>
  <style>
    body { font-family: sans-serif; display: flex; align-items: center;
           justify-content: center; min-height: 100vh; margin: 0;
           background: #002D62; color: #fff; text-align: center; padding: 1rem; }
    .btn { display: inline-block; margin: 0.5rem; padding: 0.9rem 2rem;
           border-radius: 8px; text-decoration: none; font-size: 1.1rem; font-weight: bold; }
    .primary { background: #FDB827; color: #002D62; }
    .secondary { background: transparent; color: #fff; border: 2px solid #fff; font-size: 0.95rem; }
  </style>
</head>
<body>
  <div>
    <p style="font-size:1.2rem;margin-bottom:1.5rem;">⚾ Tap to watch the archived game</p>
    <div id="links"></div>
  </div>
  <script>
    var params  = new URLSearchParams(window.location.search);
    var gamePk  = params.get('g');
    var date    = params.get('d') || '';   // YYYYMMDD, optional
    if (!gamePk) { window.location = 'https://www.mlb.com'; }

    var deepLink = 'mlbatbat://mlbtv?gamepk=' + gamePk + (date ? '&date=' + date : '');
    var webUrl   = 'https://www.mlb.com/tv/g' + gamePk;

    document.getElementById('links').innerHTML =
      '<a class="btn primary" href="' + deepLink + '">Open in MLB App</a><br>' +
      '<a class="btn secondary" href="' + webUrl + '">Open in Browser</a>';
  </script>
</body>
</html>
